<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balanced Parenthesis Checker</title>
    <!-- Fonts and Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="/static/styles.css">
    <!-- Vanta.js Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    <link rel="icon" href="data:,">
</head>
<body class="dark-mode">
    <div id="vanta-bg"></div>
    <div class="theme-toggle">
        <button id="theme-btn" aria-label="Toggle dark mode"><i class="fas fa-sun"></i></button>
    </div>
    
    <div class="app-container">
        <header class="app-header glass-panel">
            <h1><i class="fas fa-network-wired text-gradient"></i> <span class="text-gradient">BracketBrain</span></h1>
            <p>High-performance validation of brackets, braces, and parentheses with visual data flow.</p>
        </header>

        <div class="main-layout">
            <main class="content-area">
                <section class="top-section">
                    <div class="input-card glass-panel">
                        <div class="card-header">
                            <h2><i class="fas fa-terminal"></i> Expression Input</h2>
                        </div>
                        <div class="input-wrapper">
                            <div class="input-overlay" id="input-overlay"></div>
                            <input type="text" id="expression-input" placeholder="Initiate sequence... e.g., { [ (a + b) ] * c }" autocomplete="off" spellcheck="false">
                        </div>
                        <div class="action-buttons">
                            <button id="check-btn" class="primary-btn"><i class="fas fa-play"></i> Run Validation</button>
                            <button id="clear-btn" class="secondary-btn"><i class="fas fa-eraser"></i> Clear</button>
                        </div>
                    </div>
                </section>

                <section class="result-section hidden" id="result-section">
                    <div class="status-card glass-panel" id="status-card">
                        <div class="status-icon" id="status-icon"><i class="fas fa-circle-notch fa-spin"></i></div>
                        <div class="status-content">
                            <h3 id="status-title">Scanning Data...</h3>
                            <p id="status-message">Parsing expression nodes</p>
                        </div>
                    </div>
                </section>

                <section class="visualization-section hidden" id="visualization-card">
                    <div class="viz-card glass-panel">
                        <div class="viz-header">
                            <h2><i class="fas fa-project-diagram"></i> Stack Visualization</h2>
                            <div class="viz-controls">
                                <button id="play-pause-btn" class="control-btn" disabled><i class="fas fa-pause"></i> Pause</button>
                                <div class="speed-control">
                                    <label for="speed-slider">Speed:</label>
                                    <input type="range" id="speed-slider" min="100" max="2000" value="800" step="100">
                                    <span id="speed-value">800ms</span>
                                </div>
                            </div>
                        </div>
                        <div class="viz-content">
                            <div class="steps-panel">
                                <h3>Execution Steps</h3>
                                <div class="steps-list" id="steps-list"></div>
                            </div>
                            <div class="stack-panel">
                                <h3>Stack State</h3>
                                <div class="stack-container" id="stack-container">
                                    <div class="stack-empty-msg" id="stack-empty">Stack is clean</div>
                                    <div class="stack-base"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </main>

            <aside class="history-panel">
                <div class="history-card glass-panel">
                    <div class="history-header">
                        <h2><i class="fas fa-history"></i> Expression History</h2>
                        <button id="clear-history-btn" class="clear-btn"><i class="fas fa-trash"></i></button>
                    </div>
                    <div class="history-content">
                        <div id="empty-history" class="empty-state">
                            <i class="fas fa-inbox"></i>
                            <p>No expressions validated yet</p>
                        </div>
                        <ul id="history-list" class="history-list"></ul>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="/static/script.js"></script>
</body>
</html>
